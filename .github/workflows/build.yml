name: bluebuild
on:
  push:
    paths-ignore: [ "**.md" ]
  workflow_dispatch:

jobs:
  bluebuild:
    name: Build OsANA
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - recipe.yml # Исправлено: просто имя файла
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Image
        uses: blue-build/github-action@v1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          maximize_build_space: true
