# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: osana
description: My custom OS based on Fedora
base-image: ghcr.io/ublue-os/silverblue-main
image-version: 40 # Рекомендую поставить число для стабильности ISO

modules:
  - type: rpm-ostree
    install:
      - tor
      - macchanger
      - git
      - gnome-text-editor

  - type: files
    files:
      # Указываем пути относительно папки 'files' в твоем репозитории
      - source: config/backgrounds 
        destination: /usr/share/backgrounds/osana
      - source: config/schema/10-osana-wallpaper.gschema.override
        destination: /usr/share/glib-2.0/schemas/10-osana-wallpaper.gschema.override
