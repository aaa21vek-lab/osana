# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: osana
description: My custom OS based on Fedora
base-image: ghcr.io/ublue-os/silverblue-main
image-version: latest # Используем самый свежий тег

modules:
  - type: rpm-ostree
    install:
      - tor
      - macchanger
      - git
      - gnome-text-editor

  - type: files
    files:
      - source: config/backgrounds # Указываем папку целиком без слеша в конце
        destination: /usr/share/backgrounds/osana
      - source: config/schema/10-osana-wallpaper.gschema.override
        destination: /usr/share/glib-2.0/schemas/10-osana-wallpaper.gschema.override
